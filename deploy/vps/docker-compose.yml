version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_USER: "postgres"
      POSTGRES_DB: "postgres"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - web

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./app/.env
    environment:
      - NODE_ENV=production
    depends_on:
      - db
      - redis
    networks:
      - web

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - web

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./deploy/vps/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - web

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
